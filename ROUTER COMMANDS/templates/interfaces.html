<!DOCTYPE html>
<html>
<head>
    <title>Interface Setup</title>
    <style>
        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            font-family: 'Courier New', monospace;
            color: #00ffcc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .console {
            background: #111;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px #00ffcc;
            width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background: #222;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #00ffcc;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="console">
    <h3>Interface {{ current }} of {{ total }}</h3>
    <form method="POST">
        <input type="text" name="interface_name" placeholder="Interface Name" required>
        <input type="text" name="interface_ip" placeholder="Interface IP Address" required>
        <button type="submit">Submit Interface</button>
    </form>
</div>

</body>
</html>
