<!DOCTYPE html>
<html>
<head>
    <title>Router Setup</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Courier New', monospace;
            color: #00ffcc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .console {
            background: #111;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px #00ffcc;
            width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background: #222;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #00ffcc;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="console">
    <h2>Router Initialization</h2>
    <form method="POST">
        <input type="text" name="hostname" placeholder="Router Hostname" required>
        <input type="number" name="interface_no" placeholder="Number of Interfaces" min="1" required>
        <button type="submit">Begin Configuration</button>
    </form>
</div>

</body>
</html>
